name: Release Firmware

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        board:
          - env: xiao_s3
            name: xiao-esp32s3
          - env: tdongle_s3
            name: tdongle-s3
          - env: tdisplay_s3
            name: tdisplay-s3
          - env: tdisplay_s3_amoled
            name: tdisplay-s3-amoled
          - env: tbeam_s3
            name: tbeam-s3-supreme
          - env: m5stick_plus2
            name: m5stick-plus2
    name: release (${{ matrix.board.name }})
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: pio-${{ matrix.board.env }}-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            pio-${{ matrix.board.env }}-

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio
          pip install cryptography>=42.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Build web dashboard
        run: npm ci && npm run build
        working-directory: web

      - name: Build firmware
        run: pio run -e ${{ matrix.board.env }}

      - name: Prepare release artifacts
        run: |
          mkdir -p release
          cp ".pio/build/${{ matrix.board.env }}/firmware.bin" "release/oui-spy-${{ matrix.board.name }}.bin"
          cp ".pio/build/${{ matrix.board.env }}/firmware.elf" "release/oui-spy-${{ matrix.board.name }}.elf"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.board.name }}
          path: release/
          if-no-files-found: error

  create-release:
    needs: build-and-release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          pattern: release-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd release
          sha256sum *.bin *.elf > SHA256SUMS.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.bin
            release/*.elf
            release/SHA256SUMS.txt
