name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dev dependencies
        run: uv sync

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Generate TypeScript types
        run: npm run generate:types
        working-directory: web

      - name: Run pre-commit
        run: uv run pre-commit run --all-files

      - name: Run pytest
        run: uv run pytest -q

  native-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: ${{ runner.os }}-platformio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-platformio-

      - name: Install dev dependencies
        run: uv sync

      - name: Run native C++ tests
        run: |
          uv run pio test -e native
          uv run pio test -e native_parser

      - name: Generate native coverage report
        run: |
          uv run gcovr --root . --txt --print-summary \
            --fail-under-line 35 \
            --filter src/protocols/opendroneid.c \
            --filter src/protocols/wifi.c \
            --filter src/modules/detector_logic.cpp \
            --filter src/modules/flockyou_logic.cpp \
            --filter src/modules/foxhunter_logic.cpp \
            --filter src/modules/skyspy_logic.cpp \
            --filter src/hal/buzzer_logic.cpp \
            --filter src/hal/neopixel_logic.cpp \
            --xml-pretty --xml coverage-native.xml

      - name: Upload native coverage report
        uses: actions/upload-artifact@v4
        with:
          name: native-coverage
          path: coverage-native.xml
          if-no-files-found: error

  web-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Lint web source
        run: npm run lint
        working-directory: web

      - name: Run web tests
        run: npm test
        working-directory: web

      - name: Build web dashboard
        run: npm run build
        working-directory: web

      - name: Typecheck
        run: npm run typecheck
        working-directory: web

      - name: Check header freshness
        run: |
          if ! git diff --exit-code src/web/dashboard_gz.h; then
            echo "::error::src/web/dashboard_gz.h is stale — run 'cd web && npm run build' and commit"
            exit 1
          fi

      - name: Bundle size gate
        run: |
          SIZE=$(stat --printf="%s" web/dist/index.html)
          MAX=102400
          echo "Bundle size: $SIZE bytes (max: $MAX)"
          if [ "$SIZE" -gt "$MAX" ]; then
            echo "::error::Web bundle exceeds 100KB ($SIZE > $MAX)"
            exit 1
          fi

  build-firmware:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: ${{ runner.os }}-platformio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-platformio-

      - name: Install dev dependencies
        run: uv sync

      - name: Install project packages
        run: uv run pio pkg install -d .

      - name: Build firmware
        run: uv run pio run

      - name: Check firmware size
        run: |
          FW=.pio/build/seeed_xiao_esp32s3/firmware.bin
          SIZE=$(stat --printf="%s" "$FW")
          MAX=2097152
          echo "Firmware size: $SIZE bytes (max: $MAX)"
          if [ "$SIZE" -gt "$MAX" ]; then
            echo "::error::Firmware exceeds 2MB size budget ($SIZE > $MAX)"
            exit 1
          fi

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-seeed_xiao_esp32s3
          path: |
            .pio/build/seeed_xiao_esp32s3/firmware.bin
            .pio/build/seeed_xiao_esp32s3/firmware.elf
          if-no-files-found: error

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: Run cppcheck on maintained sources
        run: |
          cppcheck --quiet --error-exitcode=1 \
            --enable=warning,performance \
            --inline-suppr --suppress=missingIncludeSystem \
            -I src -I src/protocols src/app src/hal src/modules src/storage src/web src/protocols
