name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install quality tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pre-commit
        run: pre-commit run --all-files

      - name: Run pytest
        run: python -m pytest -q

  native-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio
          pip install -r requirements-dev.txt

      - name: Run native C++ tests
        run: |
          pio test -e native
          pio test -e native_parser

      - name: Generate native coverage report
        run: |
          python -m gcovr --root . --txt --print-summary \
            --fail-under-line 35 \
            --filter src/protocols/opendroneid.c \
            --filter src/protocols/wifi.c \
            --filter src/modules/detector_logic.cpp \
            --filter src/modules/flockyou_logic.cpp \
            --filter src/modules/foxhunter_logic.cpp \
            --filter src/modules/skyspy_logic.cpp \
            --filter src/hal/buzzer_logic.cpp \
            --filter src/hal/neopixel_logic.cpp \
            --xml-pretty --xml coverage-native.xml

      - name: Upload native coverage report
        uses: actions/upload-artifact@v4
        with:
          name: native-coverage
          path: coverage-native.xml
          if-no-files-found: error

  build-firmware:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: ${{ runner.os }}-platformio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-platformio-

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Install project packages
        run: pio pkg install -d .

      - name: Build firmware
        run: pio run

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-seeed_xiao_esp32s3
          path: |
            .pio/build/seeed_xiao_esp32s3/firmware.bin
            .pio/build/seeed_xiao_esp32s3/firmware.elf
          if-no-files-found: error

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: Run cppcheck on maintained sources
        run: |
          cppcheck --quiet --error-exitcode=1 \
            --enable=warning,performance \
            --inline-suppr --suppress=missingIncludeSystem \
            -I src -I src/protocols src/app src/hal src/modules src/storage src/web src/protocols
