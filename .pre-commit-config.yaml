repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: markdownlint-cli2
        name: markdownlint-cli2
        entry: npx --prefix web markdownlint-cli2
        language: system
        types: [markdown]
        exclude: ^(\.pio/|web/node_modules/)

      - id: clang-format
        name: clang-format
        entry: clang-format -i
        language: system
        files: ^src/(app|hal|modules|protocols|storage|web)/.*\.(c|cc|cpp|h|hh|hpp)$
        exclude: ^src/web/dashboard_gz\.h$

      - id: biome-check
        name: biome check (web)
        entry: bash -c 'cd web && npx biome check --no-errors-on-unmatched src/'
        language: system
        files: ^web/src/
        pass_filenames: false
        types_or: [javascript, jsx, ts, tsx, json]
