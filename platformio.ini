[platformio]
default_envs = seeed_xiao_esp32s3

[env]
test_framework = unity

[env:seeed_xiao_esp32s3]
platform = espressif32@^6.3.0
board = seeed_xiao_esp32s3
framework = arduino

; Build options
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCONFIG_BT_NIMBLE_ENABLED=1
    -Isrc/protocols

; Upload options
upload_speed = 921600
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Libraries
lib_deps =
    h2zero/NimBLE-Arduino@^1.4.0
    mathieucarbou/ESP Async WebServer@^3.0.6
    adafruit/Adafruit NeoPixel@^1.12.0
    bblanchon/ArduinoJson@^7.0.4
    mikalhart/TinyGPSPlus@^1.1.0

; Board configuration
board_build.arduino.memory_type = qio_opi
board_build.partitions = partitions.csv
board_build.filesystem = littlefs

; USB CDC configuration
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio

build_src_filter = +<*>

; Static analysis
check_tool = cppcheck
check_src_filters =
    +<src/app/>
    +<src/hal/>
    +<src/modules/>
    +<src/storage/>
    +<src/web/>
    +<src/protocols/>
check_flags =
    cppcheck: --enable=warning,performance,style,portability
    cppcheck: --inline-suppr

[env:native]
platform = native
test_framework = unity
test_filter = test_native_smoke
build_src_filter =
    -<*>
    +<hal/buzzer_logic.cpp>
    +<hal/neopixel_logic.cpp>
    +<modules/detector_logic.cpp>
    +<modules/flockyou_logic.cpp>
    +<modules/foxhunter_logic.cpp>
    +<modules/skyspy_logic.cpp>
test_build_src = no
build_flags =
    -Isrc/protocols
    -fprofile-arcs
    -ftest-coverage
    -lgcov

[env:native_parser]
platform = native
test_framework = unity
test_filter = test_native_parser_edge
build_src_filter =
    -<*>
test_build_src = no
build_flags =
    -Isrc/protocols
    -fprofile-arcs
    -ftest-coverage
    -lgcov
