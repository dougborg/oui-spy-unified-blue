[platformio]
default_envs = xiao_s3

[env]
test_framework = unity

; ============================================================================
; Common ESP32 settings shared by all board environments
; ============================================================================

[common_esp32]
framework = arduino
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip

extra_scripts =
    pre:scripts/generate_cert.py
    pre:scripts/prebuild_web.py

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DCONFIG_BT_NIMBLE_ENABLED=1
    -DCONFIG_ESP_HTTPS_SERVER_ENABLE=1
    -Isrc/protocols
    -Werror

lib_deps =
    h2zero/NimBLE-Arduino@^2.3.0
    bblanchon/ArduinoJson@^7.0.4
    mikalhart/TinyGPSPlus@^1.1.0

upload_speed = 921600
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
board_build.filesystem = littlefs
build_src_filter = +<*>

check_tool = cppcheck
check_src_filters =
    +<src/app/>
    +<src/hal/>
    +<src/modules/>
    +<src/storage/>
    +<src/web/>
    +<src/protocols/>
check_flags =
    cppcheck: --enable=warning,performance,style,portability
    cppcheck: --inline-suppr

; ============================================================================
; Common ESP32-S3 settings (extends common_esp32)
; ============================================================================

[common_s3]
extends = common_esp32
build_flags =
    ${common_esp32.build_flags}
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM

; ============================================================================
; Board Environments
; ============================================================================

[env:xiao_s3]
extends = common_s3
board = seeed_xiao_esp32s3
build_flags =
    ${common_s3.build_flags}
    -DBOARD_XIAO_S3
lib_deps =
    ${common_esp32.lib_deps}
    adafruit/Adafruit NeoPixel@^1.12.0
board_build.arduino.memory_type = qio_opi
board_build.partitions = partitions.csv
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio

[env:tdongle_s3]
extends = common_s3
board = esp32-s3-devkitm-1
build_flags =
    ${common_s3.build_flags}
    -DBOARD_TDONGLE_S3
lib_deps =
    ${common_esp32.lib_deps}
    adafruit/Adafruit DotStar@^1.2.3
board_build.partitions = partitions_16mb.csv
board_build.flash_mode = qio

[env:tdisplay_s3]
extends = common_s3
board = esp32-s3-devkitm-1
build_flags =
    ${common_s3.build_flags}
    -DBOARD_TDISPLAY_S3
lib_deps =
    ${common_esp32.lib_deps}
board_build.partitions = partitions_16mb.csv
board_build.flash_mode = qio

[env:tdisplay_s3_amoled]
extends = common_s3
board = esp32-s3-devkitm-1
build_flags =
    ${common_s3.build_flags}
    -DBOARD_TDISPLAY_S3_AMOLED
lib_deps =
    ${common_esp32.lib_deps}
board_build.partitions = partitions_16mb.csv
board_build.flash_mode = qio

[env:tbeam_s3]
extends = common_s3
board = esp32-s3-devkitm-1
build_flags =
    ${common_s3.build_flags}
    -DBOARD_TBEAM_S3
lib_deps =
    ${common_esp32.lib_deps}
board_build.partitions = partitions.csv
board_build.flash_mode = qio

[env:m5stick_plus2]
extends = common_esp32
board = esp32dev
build_flags =
    ${common_esp32.build_flags}
    -DBOARD_M5STICK_PLUS2
lib_deps =
    ${common_esp32.lib_deps}
board_build.partitions = partitions.csv

; ============================================================================
; Native test environments (unchanged)
; ============================================================================

[env:native]
platform = native
test_framework = unity
test_filter = test_native_smoke
extra_scripts = pre:scripts/native_coverage.py
build_src_filter =
    -<*>
    +<hal/buzzer_logic.cpp>
    +<hal/neopixel_logic.cpp>
    +<modules/detector_logic.cpp>
    +<modules/flockyou_logic.cpp>
    +<modules/foxhunter_logic.cpp>
    +<modules/skyspy_logic.cpp>
    +<modules/wardriver_logic.cpp>
test_build_src = no
build_flags =
    -Isrc/protocols

[env:native_parser]
platform = native
test_framework = unity
test_filter = test_native_parser_edge
extra_scripts = pre:scripts/native_coverage.py
build_src_filter =
    -<*>
test_build_src = no
build_flags =
    -Isrc/protocols
